services:
  # 1. Laravel Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mamto-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      # Mount host directory for real-time local development (live-reload on file edits)
      - .:/var/www/html
      # Preserve image-specific folders from being overridden by host mounts
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/public/build
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=marketplace
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=laravel_password
    depends_on:
      - db

  # 2. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: mamto-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=marketplace
      - POSTGRES_USER=laravel_user
      - POSTGRES_PASSWORD=laravel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
      image: dpage/pgadmin4
      ports:
          - 8080:80
      environment:
          PGADMIN_DEFAULT_EMAIL: user-name@domain-name.com
          PGADMIN_DEFAULT_PASSWORD: strong-password
      volumes:
          - pgadmin_data:/var/lib/pgadmin


volumes:
  postgres_data:
  pgadmin_data:
